name: Weekly start/sit report

# Posts your lineup + rankings as a GitHub Issue, publishes an HTML dashboard to
# GitHub Pages, and (if configured) pings Discord with the summary + dashboard link.
# Runs Thursday afternoon (before TNF) and Sunday morning (before the early games),
# and can be triggered manually from the GitHub mobile app (Actions -> Run workflow).
on:
  schedule:
    - cron: "0 21 * * 4"   # Thursday ~21:00 UTC (≈5pm ET EDT / 4pm EST)
    - cron: "0 13 * * 0"   # Sunday   ~13:00 UTC (≈9am ET EDT / 8am EST)
  workflow_dispatch:
    inputs:
      week:
        description: "NFL week (blank = auto-detect)"
        required: false
        default: ""

permissions:
  contents: read
  issues: write
  pages: write          # publish the dashboard to GitHub Pages
  id-token: write       # required by actions/deploy-pages

jobs:
  report:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FF_ROSTER_SOURCE: espn
      ESPN_LEAGUE_ID: ${{ secrets.ESPN_LEAGUE_ID }}
      ESPN_TEAM_ID: ${{ secrets.ESPN_TEAM_ID }}
      ESPN_S2: ${{ secrets.ESPN_S2 }}
      ESPN_SWID: ${{ secrets.ESPN_SWID }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      FANTASYPROS_API_KEY: ${{ secrets.FANTASYPROS_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      INPUT_WEEK: ${{ github.event.inputs.week }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Publish (one scoring pass -> digest + dashboard + Discord)
        run: |
          WEEK_ARG=""
          if [ -n "$INPUT_WEEK" ]; then WEEK_ARG="--week $INPUT_WEEK"; fi
          # Deterministic project Pages URL so the Discord link is valid even
          # though the notification fires before the deploy step below completes.
          OWNER="${GITHUB_REPOSITORY%%/*}"; REPO="${GITHUB_REPOSITORY##*/}"
          DASH_URL="https://${OWNER,,}.github.io/${REPO}/"
          python -m ff_startsit publish $WEEK_ARG \
            --report report.md --dashboard ./site/index.html \
            --discord --url "$DASH_URL"
          # Mirror the digest to the run summary (viewable in the GitHub mobile app).
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      # Post the issue first so the core digest always lands, even if Pages/Discord
      # aren't configured yet.
      - name: Post / update issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WEEK=$(grep -oE 'Week [0-9]+' report.md | head -1 | grep -oE '[0-9]+' || true)
          TITLE="Week ${WEEK:-?} start/sit"
          NUM=$(gh issue list --state open --search "in:title \"$TITLE\"" \
                --json number,title --jq ".[] | select(.title==\"$TITLE\") | .number" | head -1)
          if [ -n "$NUM" ]; then
            echo "Updating issue #$NUM"
            gh issue comment "$NUM" --body-file report.md
          else
            echo "Creating issue: $TITLE"
            gh issue create --title "$TITLE" --body-file report.md
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
